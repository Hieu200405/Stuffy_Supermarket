# ArgoCD Application Definition (GitOps)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stuffy-supermarket
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Hieu200405/Stuffy_Supermarket.git
    targetRevision: Dev
    path: kubernetes/helm/stuffy-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: stuffy-supermarket
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# Argo Rollout (Advanced Canary Deployment) for Backend API
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend-api
  namespace: stuffy-supermarket
spec:
  replicas: 5
  strategy:
    canary:
      # Step-by-step canary rollout
      steps:
      - setWeight: 10
      - pause: { duration: 1h } # Wait for 1 hour to see stability
      - setWeight: 50
      - pause: { duration: 2h }
      - setWeight: 100
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
      - name: backend-api
        image: ghcr.io/hieu200405/stuffy-backend-api:latest
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: backend-config
---
# Service for Rollout (Stable vs Canary)
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: stuffy-supermarket
spec:
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: backend-api
