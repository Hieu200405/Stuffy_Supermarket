# Specific values for Backend API Subgraph
replicaCount: 3

image:
  repository: stuffy-supermarket/backend-api
  tag: latest

service:
  port: 5000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60

env:
  MONGO_URI: "mongodb://mongodb-service:27017/stuffy_db"
  PORT: "5000"
  NODE_ENV: "production"

probe:
  path: "/api/products" # A safe endpoint to probe
