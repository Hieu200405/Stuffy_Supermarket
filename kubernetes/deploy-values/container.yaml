# Specific values for Container Host App (MFE)
replicaCount: 2

image:
  repository: stuffy-supermarket/container
  tag: latest

service:
  type: LoadBalancer # Public access
  port: 80

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env:
  # Base URL for APIs (Backend APIs)
  # In a real cluster, this would be an external LoadBalancer IP or Ingress DNS
  REACT_APP_API_GATEWAY_URL: "http://graphql-gateway-service:80/graphql"

probe:
  path: "/"
