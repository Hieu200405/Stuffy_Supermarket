name: Micro Frontend CI/CD Pipeline

on:
  push:
    branches: ["main", "master", "Dev"]
  pull_request:
    branches: ["main", "master", "Dev"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-dockerhub:
    runs-on: ubuntu-latest
    # Dùng tính năng matrix để lặp lại việc build tự động cho toàn bộ MFE + Backend
    strategy:
      matrix:
        app: [header-app, product-app, cart-app, admin-app, container, store-app, design-system-app, 3d-viewer-app, backend-api, profile-app, marketing-app, support-app]

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v3

      - name: Đăng nhập vào GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Đăng nhập vào Docker Hub
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/Dev')
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Chuyển tên Owner sang chữ thường (Lowercase)
        run: echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Thiết lập Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build và đẩy ảnh (Push Image)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./${{ matrix.app }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          # Đẩy lên cả GHCR (Không bao giờ bị giới hạn) và Docker Hub
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/stuffy-${{ matrix.app }}:latest
            ${{ secrets.DOCKER_USERNAME }}/stuffy-${{ matrix.app }}:latest
          # Truyền Gemini API Key
          build-args: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          # Dùng cache của Github Actions để tránh kéo Image từ Docker Hub quá nhiều lần
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy-to-render:
    needs: build-and-push-dockerhub
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/Dev'
    runs-on: ubuntu-latest
    steps:
      - name: Kích hoạt Webhook Deploy của Render
        run: |
          echo "Kích hoạt tự động cập nhật Web server Render từ Github Actions..."
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_CONTAINER }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_HEADER }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCT }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_CART }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_STORE }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_DESIGN_SYSTEM }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_VIEWER }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_PROFILE }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_MARKETING }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_SUPPORT }} > /dev/null || true

  visual-regression-test:
    needs: deploy-to-render
    runs-on: ubuntu-latest
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Dev')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          cd visual-tests
          npm install

      - name: Install Playwright Browsers
        run: |
          cd visual-tests
          npx playwright install --with-deps chromium

      - name: Run Visual Tests
        env:
          BASE_URL: https://stuffy-supermarket.onrender.com
        run: |
          cd visual-tests
          npm test

      - name: Upload Test Results (Screenshots)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: visual-test-results
          path: visual-tests/test-results/
