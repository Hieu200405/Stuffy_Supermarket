name: Micro Frontend CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-push-dockerhub:
    runs-on: ubuntu-latest
    # Dùng tính năng matrix để lặp lại việc build tự động cho toàn bộ Bát Quái MFE + Backend
    strategy:
      matrix:
        app: [header-app, product-app, cart-app, admin-app, container, store-app, design-system-app, backend-api]

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v3

      - name: Đăng nhập vào Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Thiết lập Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build và đẩy ảnh (Push Image) lên Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.app }}
          file: ./${{ matrix.app }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/stuffy-${{ matrix.app }}:latest

  deploy-to-render:
    needs: build-and-push-dockerhub
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Kích hoạt Webhook Deploy của Render
        run: |
          echo "Kích hoạt tự động cập nhật Web server Render từ Github Actions..."
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_CONTAINER }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_HEADER }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCT }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_CART }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_STORE }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_DESIGN_SYSTEM }} > /dev/null || true
          curl -X POST -s ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }} > /dev/null || true
